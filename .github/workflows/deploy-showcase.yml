name: Deploy showcase

# Builds apps/showcase and publishes it to GitHub Pages on every push to main.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Least-privilege token for the Pages deploy.
permissions:
  contents: read
  pages: write
  id-token: write

# One Pages deploy at a time; let an in-flight deploy finish rather than cancel it.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4 # version comes from the root packageManager field

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build showcase
        # One build for the whole site: the marketing pages, the component-registry
        # docs (/components), and the shadcn registry JSON (/r/*.json, emitted by the
        # showcase build script). Project Pages serve at /liquid-glass/ — build with
        # that base so links and the registry URLs resolve.
        env:
          SHOWCASE_BASE: /liquid-glass
        run: pnpm --filter showcase build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: apps/showcase/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
