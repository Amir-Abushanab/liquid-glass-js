    </g>
    <path d="M32 4 C 46 22 52 30 52 40 A 20 20 0 1 1 12 40 C 12 30 18 22 32 4 Z" fill="none" stroke="#5ad8ff" stroke-width="1.4" opacity="0.5" transform="translate(-0.5 -0.5)" />
    <path d="M32 4 C 46 22 52 30 52 40 A 20 20 0 1 1 12 40 C 12 30 18 22 32 4 Z" fill="none" stroke="#ff4f9d" stroke-width="1.4" opacity="0.5" transform="translate(0.5 0.5)" />
    <path d="M32 4 C 46 22 52 30 52 40 A 20 20 0 1 1 12 40 C 12 30 18 22 32 4 Z" fill="none" stroke="url(#d-rim)" stroke-width="1.5" />
