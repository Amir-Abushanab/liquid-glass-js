<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" fill="none" role="img" aria-label="Liquid Glass">
  <!-- .env-tint hue-shifts the icon per environment; see index.astro. Default 0deg = prod. -->
  <style>.env-tint { filter: hue-rotate(var(--env-hue, 0deg)); }</style>
  <defs>
    <clipPath id="d-clip"><path d="M32 4 C 46 22 52 30 52 40 A 20 20 0 1 1 12 40 C 12 30 18 22 32 4 Z" /></clipPath>
    <linearGradient id="d-aur" x1="0.28" y1="0.05" x2="0.72" y2="0.95">
      <stop stop-color="#5ad8ff" /><stop offset="0.5" stop-color="#8b6bff" /><stop offset="1" stop-color="#ff4f9d" />
    </linearGradient>
    <radialGradient id="d-depth" cx="0.5" cy="0.44" r="0.6">
      <stop offset="0.5" stop-color="#05060f" stop-opacity="0" /><stop offset="1" stop-color="#05060f" stop-opacity="0.5" />
    </radialGradient>
    <radialGradient id="d-spec" cx="0.5" cy="0.5" r="0.5">
      <stop stop-color="#fff" stop-opacity="1" /><stop offset="0.5" stop-color="#fff" stop-opacity="0.22" /><stop offset="1" stop-color="#fff" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="d-caustic" cx="0.5" cy="0.5" r="0.5">
      <stop stop-color="#fff" stop-opacity="0.92" /><stop offset="0.6" stop-color="#ffe6f4" stop-opacity="0.35" /><stop offset="1" stop-color="#ffd9f2" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="d-rim" x1="0.2" y1="0" x2="0.8" y2="1">
      <stop stop-color="#fff" stop-opacity="0.95" /><stop offset="0.42" stop-color="#fff" stop-opacity="0.1" /><stop offset="1" stop-color="#fff" stop-opacity="0.4" />
    </linearGradient>
  </defs>
  <g class="env-tint">
    <g clip-path="url(#d-clip)">
      <path d="M32 4 C 46 22 52 30 52 40 A 20 20 0 1 1 12 40 C 12 30 18 22 32 4 Z" fill="url(#d-aur)" />
      <rect x="0" y="0" width="64" height="64" fill="url(#d-depth)" />
      <ellipse cx="33" cy="49.5" rx="13" ry="7" fill="url(#d-caustic)" />
      <ellipse cx="23.5" cy="30" rx="7" ry="12" fill="url(#d-spec)" transform="rotate(-22 23.5 30)" />
      <path d="M31 7 C 22 18 16 26 14.5 35" fill="none" stroke="#fff" stroke-opacity="0.7" stroke-width="2" stroke-linecap="round" />
